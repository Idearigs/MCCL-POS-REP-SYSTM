name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "bugfix/**"
      - "hotfix/**"
      - "release/**"
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: "24"

# =====================================================================
# CHANGE DETECTION — determine which services were modified
# This prevents unnecessary deployments when only one service changes
# =====================================================================
jobs:

  changes:
    name: "Detect Changed Services"
    runs-on: ubuntu-latest
    outputs:
      pos-backend: ${{ steps.filter.outputs.pos-backend }}
      pos-frontend: ${{ steps.filter.outputs.pos-frontend }}
      mainframe-backend: ${{ steps.filter.outputs.mainframe-backend }}
      mainframe-admin: ${{ steps.filter.outputs.mainframe-admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pos-backend:
              - 'backend/**'
              - '.github/workflows/ci-cd.yml'
            pos-frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'tailwind.config.js'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci-cd.yml'
            mainframe-backend:
              - 'mainframe-backend/**'
              - '.github/workflows/ci-cd.yml'
            mainframe-admin:
              - 'mainframe-admin/**'
              - '.github/workflows/ci-cd.yml'

  # -------------------------------------------------------------------
  # JOB 1 — POS Backend lint & unit tests
  # -------------------------------------------------------------------
  test-backend:
    name: "POS Backend — Lint & Unit Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.pos-backend == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint (check only — no auto-fix)
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Run unit tests with coverage
        run: npm run test:cov
        timeout-minutes: 10
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          JWT_SECRET: "test_jwt_secret_for_ci"
          JWT_REFRESH_SECRET: "test_jwt_refresh_secret_for_ci"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Build TypeScript (compile check)
        run: npm run build

  # -------------------------------------------------------------------
  # JOB 2 — POS Frontend lint & build validation
  # -------------------------------------------------------------------
  test-frontend:
    name: "POS Frontend — Lint & Build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.pos-frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Build frontend (type-check + bundle)
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.truedesk.co.uk/api/v1
          # VITE_TENANT_ID intentionally unset — enables multi-tenant mode
          VITE_APP_TITLE: "MPS Jewelry System"
          VITE_APP_VERSION: ${{ github.sha }}

  # -------------------------------------------------------------------
  # JOB 3 — Mainframe Backend lint & build
  # -------------------------------------------------------------------
  test-mainframe-backend:
    name: "Mainframe Backend — Build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mainframe-backend == 'true'

    defaults:
      run:
        working-directory: mainframe-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mainframe-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build TypeScript (compile check)
        run: npm run build

  # -------------------------------------------------------------------
  # JOB 4 — Mainframe Admin build validation
  # -------------------------------------------------------------------
  test-mainframe-admin:
    name: "Mainframe Admin — Build"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.mainframe-admin == 'true'

    defaults:
      run:
        working-directory: mainframe-admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mainframe-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build mainframe admin
        run: npm run build
        env:
          VITE_API_URL: https://apimainframe.truedesk.co.uk/api/v1

  # -------------------------------------------------------------------
  # JOB 5 — Deploy POS Backend (only when backend files changed)
  # -------------------------------------------------------------------
  deploy-pos-backend:
    name: "Deploy — POS Backend"
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.pos-backend == 'true'

    environment:
      name: production
      url: https://api.truedesk.co.uk

    steps:
      - name: Trigger Coolify POS backend deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_BACKEND_WEBHOOK: ${{ secrets.COOLIFY_BACKEND_WEBHOOK }}
        run: |
          TOKEN=$(echo "$COOLIFY_TOKEN" | tr -d '[:space:]')
          WEBHOOK=$(echo "$COOLIFY_BACKEND_WEBHOOK" | tr -d '[:space:]')

          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 30 -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}")

          echo "Response: $(cat /tmp/response.txt)"
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: POS backend webhook failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "POS backend deployment triggered"

      - name: Health check — wait for backend to come up
        run: |
          echo "Waiting 45s for Coolify to pull and restart the container..."
          sleep 45
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.truedesk.co.uk/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: Backend health check failed after deployment."
          exit 1

  # -------------------------------------------------------------------
  # JOB 6 — Deploy POS Frontend (only when frontend files changed)
  # -------------------------------------------------------------------
  deploy-pos-frontend:
    name: "Deploy — POS Frontend"
    runs-on: ubuntu-latest
    needs: [changes, test-frontend]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.pos-frontend == 'true'

    environment:
      name: production
      url: https://pos.truedesk.co.uk

    steps:
      - name: Trigger Coolify POS frontend deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_FRONTEND_WEBHOOK: ${{ secrets.COOLIFY_FRONTEND_WEBHOOK }}
        run: |
          TOKEN=$(echo "$COOLIFY_TOKEN" | tr -d '[:space:]')
          WEBHOOK=$(echo "$COOLIFY_FRONTEND_WEBHOOK" | tr -d '[:space:]')

          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 30 -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}")

          echo "Response: $(cat /tmp/response.txt)"
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: POS frontend webhook failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "POS frontend deployment triggered"

      - name: Health check — wait for frontend to come up
        run: |
          echo "Waiting 45s for Coolify to pull and restart the container..."
          sleep 45
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://pos.truedesk.co.uk || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: Frontend health check failed after deployment."
          exit 1

  # -------------------------------------------------------------------
  # JOB 7 — Deploy Mainframe Backend (only when mainframe-backend changed)
  # -------------------------------------------------------------------
  deploy-mainframe-backend:
    name: "Deploy — Mainframe Backend"
    runs-on: ubuntu-latest
    needs: [changes, test-mainframe-backend]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.mainframe-backend == 'true'

    environment:
      name: production
      url: https://apimainframe.truedesk.co.uk

    steps:
      - name: Trigger Coolify mainframe backend deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_MAINFRAME_BACKEND_WEBHOOK: ${{ secrets.COOLIFY_MAINFRAME_BACKEND_WEBHOOK }}
        run: |
          TOKEN=$(echo "$COOLIFY_TOKEN" | tr -d '[:space:]')
          WEBHOOK=$(echo "$COOLIFY_MAINFRAME_BACKEND_WEBHOOK" | tr -d '[:space:]')

          if [ -z "$WEBHOOK" ]; then
            echo "ERROR: COOLIFY_MAINFRAME_BACKEND_WEBHOOK secret is not set."
            echo "Add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 30 -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}")

          echo "Response: $(cat /tmp/response.txt)"
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Mainframe backend webhook failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Mainframe backend deployment triggered"

  # -------------------------------------------------------------------
  # JOB 8 — Deploy Mainframe Admin (only when mainframe-admin changed)
  # -------------------------------------------------------------------
  deploy-mainframe-admin:
    name: "Deploy — Mainframe Admin"
    runs-on: ubuntu-latest
    needs: [changes, test-mainframe-admin]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.mainframe-admin == 'true'

    environment:
      name: production
      url: https://mainframe.truedesk.co.uk

    steps:
      - name: Trigger Coolify mainframe admin deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_MAINFRAME_ADMIN_WEBHOOK: ${{ secrets.COOLIFY_MAINFRAME_ADMIN_WEBHOOK }}
        run: |
          TOKEN=$(echo "$COOLIFY_TOKEN" | tr -d '[:space:]')
          WEBHOOK=$(echo "$COOLIFY_MAINFRAME_ADMIN_WEBHOOK" | tr -d '[:space:]')

          if [ -z "$WEBHOOK" ]; then
            echo "ERROR: COOLIFY_MAINFRAME_ADMIN_WEBHOOK secret is not set."
            echo "Add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi

          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 30 -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}")

          echo "Response: $(cat /tmp/response.txt)"
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Mainframe admin webhook failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Mainframe admin deployment triggered"

  # -------------------------------------------------------------------
  # CI GATE — single always-running status check for branch protection
  # The per-service test jobs above are conditional (change detection),
  # so they can't be required directly without dead-locking PRs that
  # don't touch that service. This gate always runs, waits on all test
  # jobs, and fails only if one of them actually FAILED (skipped is OK).
  # Mark *this* check ("CI Gate") as the required status check on the
  # protected branches.
  # -------------------------------------------------------------------
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
      - test-mainframe-backend
      - test-mainframe-admin
    if: always()
    steps:
      - name: Verify no required CI job failed
        run: |
          backend='${{ needs.test-backend.result }}'
          frontend='${{ needs.test-frontend.result }}'
          mf_backend='${{ needs.test-mainframe-backend.result }}'
          mf_admin='${{ needs.test-mainframe-admin.result }}'
          echo "test-backend:           $backend"
          echo "test-frontend:          $frontend"
          echo "test-mainframe-backend: $mf_backend"
          echo "test-mainframe-admin:   $mf_admin"
          for r in "$backend" "$frontend" "$mf_backend" "$mf_admin"; do
            # A job that ran and failed/was cancelled blocks the merge.
            # 'success' and 'skipped' (not relevant to this PR) are fine.
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required CI job did not pass ($r). Blocking merge."
              exit 1
            fi
          done
          echo "All applicable CI jobs passed. Gate is green."
