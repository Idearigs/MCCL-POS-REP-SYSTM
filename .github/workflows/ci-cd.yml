name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "20"

# =====================================================================
# JOBS
# =====================================================================
jobs:

  # -------------------------------------------------------------------
  # JOB 1 — Backend lint & unit tests (no real DB required)
  # -------------------------------------------------------------------
  test-backend:
    name: "Backend — Lint & Unit Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Run unit tests with coverage
        run: npm run test:cov
        env:
          NODE_ENV: test
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          JWT_SECRET: "test_jwt_secret_for_ci"
          JWT_REFRESH_SECRET: "test_jwt_refresh_secret_for_ci"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Build TypeScript (compile check)
        run: npm run build

  # -------------------------------------------------------------------
  # JOB 2 — POS Frontend lint & build validation
  # -------------------------------------------------------------------
  test-frontend:
    name: "Frontend — Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Build frontend (type-check + bundle)
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.truedesk.co.uk/api/v1
          # VITE_TENANT_ID intentionally unset — enables multi-tenant mode (company code field on login)
          VITE_APP_TITLE: "MPS Jewelry System"
          VITE_APP_VERSION: ${{ github.sha }}

  # -------------------------------------------------------------------
  # JOB 3 — Mainframe Admin build validation
  # -------------------------------------------------------------------
  test-mainframe-admin:
    name: "Mainframe Admin — Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mainframe-admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mainframe-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build mainframe admin
        run: npm run build
        env:
          VITE_API_URL: https://apimainframe.truedesk.co.uk/api/v1

  # -------------------------------------------------------------------
  # JOB 4 — Deploy POS backend via Coolify webhook (main only)
  # -------------------------------------------------------------------
  deploy-backend:
    name: "Deploy — POS Backend (Coolify)"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://api.truedesk.co.uk

    steps:
      - name: Trigger Coolify backend deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_BACKEND_WEBHOOK: ${{ secrets.COOLIFY_BACKEND_WEBHOOK }}
        run: |
          TOKEN=$(echo "$COOLIFY_TOKEN" | tr -d '[:space:]')
          WEBHOOK=$(echo "$COOLIFY_BACKEND_WEBHOOK" | tr -d '[:space:]')

          HTTP_STATUS=$(curl -s -o /tmp/coolify_backend_response.txt -w "%{http_code}" \
            --max-time 30 \
            -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}")

          echo "Coolify response: $(cat /tmp/coolify_backend_response.txt)"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Coolify backend webhook failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Backend deployment triggered successfully"

  # -------------------------------------------------------------------
  # JOB 5 — Deploy POS frontend via Coolify webhook (main only)
  # -------------------------------------------------------------------
  deploy-frontend:
    name: "Deploy — POS Frontend (Coolify)"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://pos.truedesk.co.uk

    steps:
      - name: Trigger Coolify frontend deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_FRONTEND_WEBHOOK: ${{ secrets.COOLIFY_FRONTEND_WEBHOOK }}
        run: |
          TOKEN=$(echo "$COOLIFY_TOKEN" | tr -d '[:space:]')
          WEBHOOK=$(echo "$COOLIFY_FRONTEND_WEBHOOK" | tr -d '[:space:]')

          HTTP_STATUS=$(curl -s -o /tmp/coolify_frontend_response.txt -w "%{http_code}" \
            --max-time 30 \
            -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}")

          echo "Coolify response: $(cat /tmp/coolify_frontend_response.txt)"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Coolify frontend webhook failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Frontend deployment triggered successfully"

  # -------------------------------------------------------------------
  # JOB 6 — Deploy Mainframe backend via Coolify webhook (main only)
  # -------------------------------------------------------------------
  deploy-mainframe-backend:
    name: "Deploy — Mainframe Backend (Coolify)"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-mainframe-admin]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://apimainframe.truedesk.co.uk

    steps:
      - name: Trigger Coolify mainframe backend deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_MAINFRAME_BACKEND_WEBHOOK: ${{ secrets.COOLIFY_MAINFRAME_BACKEND_WEBHOOK }}
        run: |
          TOKEN=$(echo "$COOLIFY_TOKEN" | tr -d '[:space:]')
          WEBHOOK=$(echo "$COOLIFY_MAINFRAME_BACKEND_WEBHOOK" | tr -d '[:space:]')

          HTTP_STATUS=$(curl -s -o /tmp/coolify_mf_backend_response.txt -w "%{http_code}" \
            --max-time 30 \
            -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}")

          echo "Coolify response: $(cat /tmp/coolify_mf_backend_response.txt)"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Coolify mainframe backend webhook failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Mainframe backend deployment triggered successfully"

  # -------------------------------------------------------------------
  # JOB 7 — Deploy Mainframe admin via Coolify webhook (main only)
  # -------------------------------------------------------------------
  deploy-mainframe-admin:
    name: "Deploy — Mainframe Admin (Coolify)"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-mainframe-admin]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://mainframe.truedesk.co.uk

    steps:
      - name: Trigger Coolify mainframe admin deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_MAINFRAME_ADMIN_WEBHOOK: ${{ secrets.COOLIFY_MAINFRAME_ADMIN_WEBHOOK }}
        run: |
          TOKEN=$(echo "$COOLIFY_TOKEN" | tr -d '[:space:]')
          WEBHOOK=$(echo "$COOLIFY_MAINFRAME_ADMIN_WEBHOOK" | tr -d '[:space:]')

          HTTP_STATUS=$(curl -s -o /tmp/coolify_mf_admin_response.txt -w "%{http_code}" \
            --max-time 30 \
            -X GET \
            -H "Authorization: Bearer ${TOKEN}" \
            "${WEBHOOK}")

          echo "Coolify response: $(cat /tmp/coolify_mf_admin_response.txt)"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Coolify mainframe admin webhook failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Mainframe admin deployment triggered successfully"

  # -------------------------------------------------------------------
  # JOB 8 — Smoke test after all deploys complete
  # -------------------------------------------------------------------
  smoke-test:
    name: "Smoke Test — Production"
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-mainframe-backend, deploy-mainframe-admin]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for Coolify to finish building & deploying
        run: |
          echo "Waiting 90s for Coolify to build and deploy..."
          sleep 90

      - name: Health check — POS API
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://api.truedesk.co.uk/health" || echo "000")
          echo "POS API status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then echo "ERROR: POS API health check failed"; exit 1; fi

      - name: Health check — POS Frontend
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://pos.truedesk.co.uk" || echo "000")
          echo "POS Frontend status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then echo "ERROR: POS frontend health check failed"; exit 1; fi

      - name: Health check — Mainframe API
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://apimainframe.truedesk.co.uk/health" || echo "000")
          echo "Mainframe API status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then echo "ERROR: Mainframe API health check failed"; exit 1; fi

      - name: Health check — Mainframe Admin
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://mainframe.truedesk.co.uk" || echo "000")
          echo "Mainframe Admin status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then echo "ERROR: Mainframe admin health check failed"; exit 1; fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke test failed after deployment!"
          echo "Check Coolify dashboard for build/deploy logs."
