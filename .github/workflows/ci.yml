name: CI

# Runs lint + build for both the frontend and backend on every PR into the
# protected branches, and on direct pushes to develop. No secrets are required:
# the backend "build" only compiles TypeScript and generates the Prisma client
# from the schema — it never connects to a database.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

# Cancel superseded runs on the same ref so a quick re-push doesn't queue up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # The package "lint" script runs eslint with --fix, which would mask
      # fixable problems by silently correcting them. In CI we run eslint in
      # check-only mode so the job actually fails on lint violations.
      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Build
        run: npm run build
