name: "✨ Feature request"
description: "A new capability or improvement"
title: "feat: "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / goal
      description: What problem does this solve, or what should become possible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Roughly how should it work? Sketch the behaviour, not necessarily the code.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done?
      placeholder: |
        - [ ] …
        - [ ] …
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "area:pos-backend"
        - "area:pos-frontend"
        - "area:mainframe"
        - "area:ops"
    validations:
      required: true
