version: '3.9'

# ==========================================
# Production Stack
# ==========================================

services:
  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: mps_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---- Backend (NestJS) ----
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/mps-backend:${IMAGE_TAG:-latest}
    container_name: mps_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: 7d
      JWT_REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://pos.buymejewellery.co.uk}
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_LIMIT: 200
      VOODOOSMS_API_KEY: ${VOODOOSMS_API_KEY}
      VOODOOSMS_SENDER_ID: ${VOODOOSMS_SENDER_ID:-MPS Jewel}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOLD_API_KEY: ${GOLD_API_KEY:-}
      GOOGLE_DRIVE_CLIENT_EMAIL: ${GOOGLE_DRIVE_CLIENT_EMAIL}
      GOOGLE_DRIVE_PRIVATE_KEY: ${GOOGLE_DRIVE_PRIVATE_KEY}
      GOOGLE_DRIVE_PROJECT_ID: ${GOOGLE_DRIVE_PROJECT_ID}
      GOOGLE_DRIVE_PARENT_FOLDER_ID: ${GOOGLE_DRIVE_PARENT_FOLDER_ID}
      GOOGLE_SHARED_DRIVE_REPAIRS_FOLDER_ID: ${GOOGLE_SHARED_DRIVE_REPAIRS_FOLDER_ID:-}
      GOOGLE_SHARED_DRIVE_CUSTOMERS_FOLDER_ID: ${GOOGLE_SHARED_DRIVE_CUSTOMERS_FOLDER_ID:-}
      GOOGLE_SHARED_DRIVE_PRODUCTS_FOLDER_ID: ${GOOGLE_SHARED_DRIVE_PRODUCTS_FOLDER_ID:-}
      GOOGLE_SHARED_DRIVE_RECEIPTS_FOLDER_ID: ${GOOGLE_SHARED_DRIVE_RECEIPTS_FOLDER_ID:-}
      GOOGLE_DRIVE_TENANT_IDS: ${GOOGLE_DRIVE_TENANT_IDS:-buymejewellery}
      APP_URL: ${APP_URL:-https://api.truedesk.co.uk}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-buymejewellery}
      TENANT_DOMAIN_MAPPING: ${TENANT_DOMAIN_MAPPING}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ---- Frontend (nginx + React build) ----
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/mps-frontend:${IMAGE_TAG:-latest}
    container_name: mps_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health.html"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Nginx Reverse Proxy (SSL termination) ----
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: mps_nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - web
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  uploads_data:
  ssl_certs:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
