# Nginx Configuration for Jewelry SaaS System
# Domain: buymejewellery.co.uk

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=pos_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=ecommerce_limit:10m rate=30r/s;

# Upstream servers
upstream pos_backend {
    server 127.0.0.1:3001; # NestJS POS Backend
    keepalive 32;
}

upstream ecommerce_backend {
    server 127.0.0.1:3002; # Existing E-commerce Backend
    keepalive 32;
}

# Security headers map
map $sent_http_content_type $security_headers {
    default "nosniff";
}

# ============================================================================
# 1. MAIN E-COMMERCE SITE - buymejewellery.co.uk
# ============================================================================
server {
    listen 80;
    server_name buymejewellery.co.uk www.buymejewellery.co.uk;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name buymejewellery.co.uk www.buymejewellery.co.uk;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.buymejewellery.co.uk;" always;
    
    # Rate limiting
    limit_req zone=ecommerce_limit burst=50 nodelay;
    
    # Gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    gzip_vary on;
    
    # Main e-commerce location
    location / {
        proxy_pass http://ecommerce_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # Static files optimization
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ============================================================================
# 2. POS FRONTEND - pos.buymejewellery.co.uk
# ============================================================================
server {
    listen 80;
    server_name pos.buymejewellery.co.uk;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pos.buymejewellery.co.uk;
    
    # SSL Configuration (same as main site)
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # POS Security Headers (more restrictive)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://drive.google.com; connect-src 'self' https://api.buymejewellery.co.uk;" always;
    
    # Rate limiting for POS
    limit_req zone=pos_limit burst=30 nodelay;
    
    # Gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_vary on;
    
    # Document root for React build
    root /var/www/pos.buymejewellery.co.uk/build;
    index index.html;
    
    # Handle React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security for sensitive routes
        location ~* ^/(admin|settings|reports) {
            auth_basic "Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd_pos;
            try_files $uri $uri/ /index.html;
        }
    }
    
    # Static asset optimization
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # Enable CORS for fonts
        location ~* \.(woff|woff2)$ {
            add_header Access-Control-Allow-Origin "*";
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
    
    # Security: Block access to sensitive files
    location ~* \.(env|log|config)$ {
        deny all;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ============================================================================
# 3. API BACKEND - api.buymejewellery.co.uk
# ============================================================================
server {
    listen 80;
    server_name api.buymejewellery.co.uk;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.buymejewellery.co.uk;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # API Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # CORS Configuration for API
    add_header Access-Control-Allow-Origin "https://pos.buymejewellery.co.uk" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
    add_header Access-Control-Allow-Credentials "true" always;
    
    # Rate limiting for API (strict)
    limit_req zone=api_limit burst=20 nodelay;
    
    # Handle CORS preflight requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://pos.buymejewellery.co.uk";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
        
        # Proxy to NestJS backend
        proxy_pass http://pos_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        # Request size limits
        client_max_body_size 50M; # For file uploads
    }
    
    # API Documentation (Swagger)
    location /docs {
        proxy_pass http://pos_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Basic auth for API docs in production
        auth_basic "API Documentation";
        auth_basic_user_file /etc/nginx/.htpasswd_api;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://pos_backend/health;
        access_log off;
    }
    
    # File upload endpoint (higher size limit)
    location /api/files/upload {
        client_max_body_size 100M;
        proxy_pass http://pos_backend/api/files/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s; # 10 minutes for large uploads
        proxy_send_timeout 600s;
    }
    
    # Block access to admin endpoints from public
    location ~* ^/api/(admin|internal)/ {
        allow 127.0.0.1;
        allow 192.168.1.0/24; # Your internal network
        deny all;
        
        proxy_pass http://pos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================================
# 4. SECURITY AND MONITORING
# ============================================================================

# Block common exploit attempts
location ~* \.(php|asp|aspx|jsp)$ {
    deny all;
}

# Block access to hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Block access to backup files
location ~* \.(bak|backup|swp|tmp)$ {
    deny all;
}

# Log format for better monitoring
log_format detailed '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   '$request_time $upstream_response_time';

# Error pages
error_page 404 /404.html;
error_page 500 502 503 504 /50x.html;

# Monitoring and metrics endpoint (restrict access)
server {
    listen 127.0.0.1:8080;
    server_name localhost;
    
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}