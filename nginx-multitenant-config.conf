# Multi-Tenant Jewelry SaaS - Nginx Configuration
# Client: buymejewellery.co.uk
# Architecture: E-commerce + POS System on same VPS

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ecommerce_api:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=pos_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=frontend:10m rate=100r/s;

# Upstream servers
upstream ecommerce_backend {
    server 127.0.0.1:3001; # Node.js E-commerce API
    keepalive 32;
}

upstream pos_backend {
    server 127.0.0.1:3003; # NestJS POS API
    keepalive 32;
}

# ============================================================================
# 1. MAIN E-COMMERCE SITE - buymejewellery.co.uk
# ============================================================================
server {
    listen 80;
    server_name buymejewellery.co.uk www.buymejewellery.co.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name buymejewellery.co.uk www.buymejewellery.co.uk;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api-shop.buymejewellery.co.uk;" always;
    
    # Rate limiting
    limit_req zone=frontend burst=200 nodelay;
    
    # Document root for e-commerce frontend
    root /var/www/buymejewellery.co.uk;
    index index.html index.php;
    
    # PHP handling (if using WordPress/PHP)
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    # Static files optimization
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Default location
    location / {
        try_files $uri $uri/ /index.html /index.php?$args;
    }
}

# ============================================================================
# 2. E-COMMERCE API - api-shop.buymejewellery.co.uk  
# ============================================================================
server {
    listen 80;
    server_name api-shop.buymejewellery.co.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api-shop.buymejewellery.co.uk;
    
    # SSL Configuration (same certificate)
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    
    # API Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # CORS for e-commerce API
    add_header Access-Control-Allow-Origin "https://buymejewellery.co.uk" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;
    
    # Rate limiting for e-commerce API
    limit_req zone=ecommerce_api burst=100 nodelay;
    
    # Handle CORS preflight
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://buymejewellery.co.uk";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
        
        # Proxy to e-commerce backend
        proxy_pass http://ecommerce_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        client_max_body_size 50M; # For product images
    }
    
    # Health check
    location /health {
        proxy_pass http://ecommerce_backend/health;
        access_log off;
    }
}

# ============================================================================
# 3. POS FRONTEND - pos.buymejewellery.co.uk
# ============================================================================
server {
    listen 80;
    server_name pos.buymejewellery.co.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pos.buymejewellery.co.uk;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    
    # Strict Security Headers for POS
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://drive.google.com; connect-src 'self' https://api-pos.buymejewellery.co.uk;" always;
    
    # Rate limiting
    limit_req zone=frontend burst=150 nodelay;
    
    # Gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_vary on;
    
    # Document root for React build
    root /var/www/pos.buymejewellery.co.uk/build;
    index index.html;
    
    # Handle React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Security for admin routes
    location ~* ^/(admin|reports|settings) {
        # Additional authentication for sensitive areas
        try_files $uri $uri/ /index.html;
        
        # Optional: Add basic auth for extra security
        # auth_basic "POS Admin Area";
        # auth_basic_user_file /etc/nginx/.htpasswd_pos_admin;
    }
    
    # Static asset optimization
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # CORS for fonts
        location ~* \.(woff|woff2)$ {
            add_header Access-Control-Allow-Origin "*";
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
    
    # Security: Block sensitive files
    location ~* \.(env|log|config|sql)$ {
        deny all;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "POS Frontend Healthy\n";
        add_header Content-Type text/plain;
    }
}

# ============================================================================
# 4. POS API - api-pos.buymejewellery.co.uk
# ============================================================================
server {
    listen 80;
    server_name api-pos.buymejewellery.co.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api-pos.buymejewellery.co.uk;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    
    # Strict API Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # CORS for POS API (more restrictive)
    add_header Access-Control-Allow-Origin "https://pos.buymejewellery.co.uk" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range,X-Total-Count" always;
    add_header Access-Control-Allow-Credentials "true" always;
    
    # Strict rate limiting for POS API
    limit_req zone=pos_api burst=50 nodelay;
    
    # Handle CORS preflight requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://pos.buymejewellery.co.uk";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
        
        # Add tenant identification
        proxy_set_header X-Tenant-ID "buymejewellery";
        proxy_set_header X-Client-Domain "buymejewellery.co.uk";
        
        # Proxy to NestJS POS backend
        proxy_pass http://pos_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        client_max_body_size 100M; # For file uploads
    }
    
    # API Documentation (protected)
    location /docs {
        # Restrict access to internal network only
        allow 192.168.1.0/24;
        allow 127.0.0.1;
        deny all;
        
        proxy_pass http://pos_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Optional: Basic auth for API docs
        auth_basic "POS API Documentation";
        auth_basic_user_file /etc/nginx/.htpasswd_pos_api;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://pos_backend/health;
        access_log off;
    }
    
    # File upload endpoint (higher limits)
    location /api/files/upload {
        client_max_body_size 200M; # Large jewelry images
        proxy_pass http://pos_backend/api/files/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID "buymejewellery";
        proxy_read_timeout 900s; # 15 minutes for large uploads
        proxy_send_timeout 900s;
    }
    
    # Admin/Internal endpoints (restrict access)
    location ~* ^/api/(admin|internal|system)/ {
        # Only allow from internal network
        allow 127.0.0.1;
        allow 192.168.1.0/24;
        deny all;
        
        proxy_pass http://pos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID "buymejewellery";
    }
    
    # Webhook endpoints (for future integrations)
    location ~* ^/api/webhooks/ {
        # Rate limit webhook endpoints more strictly
        limit_req zone=pos_api burst=10 nodelay;
        
        proxy_pass http://pos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID "buymejewellery";
    }
}

# ============================================================================
# 5. ADMIN DASHBOARD - admin.buymejewellery.co.uk (Optional)
# ============================================================================
server {
    listen 80;
    server_name admin.buymejewellery.co.uk;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.buymejewellery.co.uk;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    
    # Maximum security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
