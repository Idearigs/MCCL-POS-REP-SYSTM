        try_files $uri $uri/ /index.html;
    }
}

# ============================================================================
# 6. SECURITY AND MONITORING
# ============================================================================

# Block common exploit attempts
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    
    # Default SSL certificate for invalid domains
    ssl_certificate /etc/letsencrypt/live/buymejewellery.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buymejewellery.co.uk/privkey.pem;
    
    return 444; # Close connection without response
}

# Block access to hidden files
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Block access to backup/temp files
location ~* \.(bak|backup|swp|tmp|old|orig|~)$ {
    deny all;
}

# Block common exploit patterns
location ~* \.(php|asp|aspx|jsp|cgi|py|rb|pl|sh)$ {
    # Only allow if specifically configured above
    deny all;
}

# Enhanced logging format
log_format detailed '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   '$request_time $upstream_response_time '
                   '$ssl_protocol $ssl_cipher '
                   'tenant=$http_x_tenant_id';

# Error pages
error_page 404 /404.html;
error_page 500 502 503 504 /50x.html;

# Monitoring endpoints (internal only)
server {
    listen 127.0.0.1:8080;
    server_name localhost;
    access_log off;
    
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
    
    location /php_status {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $fastcgi_script_name;
        allow 127.0.0.1;
        deny all;
    }
}